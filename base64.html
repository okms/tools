<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encode / Decode</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            max-width: 960px;
            margin: 0 auto;
            padding: 1rem;
            color: #24292f;
        }
        h1 { margin-bottom: 1rem; font-size: 1.5rem; }
        .panes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 600px) {
            .panes { grid-template-columns: 1fr; }
        }
        .pane label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 0.5rem;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.875rem;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            resize: vertical;
        }
        textarea:focus { outline: 2px solid #0969da; border-color: transparent; }
        .error {
            color: #cf222e;
            font-size: 0.85rem;
            min-height: 1.25rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <h1>Base64 Encode / Decode</h1>
    <div class="panes">
        <div class="pane">
            <label for="text">Text</label>
            <textarea id="text" placeholder="Type or paste text here…"></textarea>
            <div class="error" id="text-error"></div>
        </div>
        <div class="pane">
            <label for="encoded">Base64</label>
            <textarea id="encoded" placeholder="Type or paste Base64 here…"></textarea>
            <div class="error" id="encoded-error"></div>
        </div>
    </div>
    <script>
        const textEl = document.getElementById("text");
        const encodedEl = document.getElementById("encoded");
        const textError = document.getElementById("text-error");
        const encodedError = document.getElementById("encoded-error");

        let updating = false;

        textEl.addEventListener("input", () => {
            if (updating) return;
            updating = true;
            textError.textContent = "";
            encodedError.textContent = "";
            try {
                encodedEl.value = btoa(unescape(encodeURIComponent(textEl.value)));
            } catch (e) {
                textError.textContent = "Encoding failed: " + e.message;
            }
            updating = false;
        });

        encodedEl.addEventListener("input", () => {
            if (updating) return;
            updating = true;
            textError.textContent = "";
            encodedError.textContent = "";
            try {
                textEl.value = decodeURIComponent(escape(atob(encodedEl.value)));
            } catch (e) {
                encodedError.textContent = "Invalid Base64";
            }
            updating = false;
        });
    </script>
</body>
</html>
